commit-msg:
  commands:
    format:
      run: |
        subject=$(grep -v '^#' "{1}" | grep -v '^[[:space:]]*$' | head -n1)

        case $subject in
          "Merge "* | "Revert "* | "revert: "* | "fixup!"* | "squash!"*)
            exit 0
            ;;
        esac

        if [[ $subject =~ ^[a-z0-9][a-z0-9/_,-]*:\ .+ ]]; then
          exit 0
        fi

        echo "commit message does not match '<component>: <description>'" >&2
        echo "  got:      $subject" >&2
        echo "  expected: git: add the thing" >&2
        exit 1

pre-commit:
  parallel: true
  commands:
    shellcheck:
      glob:
        - "*.sh"
        - "*.bash"
        - "**/modify_*"
        - "**/executable_*"
      exclude:
        - "*.tmpl"
      run: shellcheck {staged_files}
    shfmt:
      glob:
        - "*.sh"
        - "*.bash"
        - "**/modify_*"
        - "**/executable_*"
      exclude:
        - "*.tmpl"
      run: shfmt -i 2 -ci -bn -s -d {staged_files}
    shellcheck-tmpl:
      glob:
        - "*.sh.tmpl"
        - "*.bash.tmpl"
      run: |
        fail=0
        for f in {staged_files}; do
          chezmoi execute-template < "$f" | shellcheck - || fail=1
        done
        exit $fail
    shebang:
      glob:
        - "*.sh"
        - "*.bash"
        - "*.sh.tmpl"
        - "*.bash.tmpl"
        - "**/modify_*"
        - "**/executable_*"
      run: |
        fail=0
        for f in {staged_files}; do
          shebang=$(head -n1 "$f")
          if [[ $shebang == "#!/bin/bash" || $shebang == "#!/bin/sh" ]]; then
            echo "$f: use '#!/usr/bin/env bash' instead of '$shebang'" >&2
            fail=1
          fi
        done
        exit $fail
    no-private-terms:
      run: |
        patterns=$(mktemp)
        trap 'rm -f "$patterns"' EXIT

        chezmoi_args=()
        [[ -z ${CHEZMOI_CONFIG:-} ]] || chezmoi_args+=(--config "$CHEZMOI_CONFIG")

        terms=$(chezmoi "${chezmoi_args[@]}" data --format=json | jq -r '.private_terms // ""')
        [[ -n $terms ]] || exit 0

        printf '%s\n' "$terms" \
          | tr ',' '\n' \
          | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' \
          | grep -v '^$' >"$patterns"

        [[ -s $patterns ]] || exit 0

        fail=0
        for f in {staged_files}; do
          if matches=$(grep -HIniF -f "$patterns" "$f" 2>/dev/null); then
            echo "private term(s) found in staged files - not corrected:" >&2
            echo "$matches" >&2
            echo "Use a chezmoi data variable instead (see CLAUDE.md)." >&2
            fail=1
          fi
        done
        exit $fail
    shfmt-tmpl:
      glob:
        - "*.sh.tmpl"
        - "*.bash.tmpl"
      run: |
        fail=0
        for f in {staged_files}; do
          chezmoi execute-template < "$f" | shfmt -i 2 -ci -bn -s -d - || fail=1
        done
        exit $fail
