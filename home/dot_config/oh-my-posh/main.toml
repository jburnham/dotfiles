console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 3
final_space = true

[palette]
  blue = 'blue'
  magenta = 'magenta'
  red = 'red'
  white = 'white'
  yellow = 'yellow'

[secondary_prompt]
  template = '❯❯ '
  foreground = 'p:magenta'
  background = 'transparent'

[transient_prompt]
  template = '{{ if .Segments.Time }}{{ .Segments.Time.CurrentDate | date .Segments.Time.Format }}{{ else }}{{ now | date "15:04:05" }}{{ end }} {{ if gt .Code 0 }}<p:red>❯</>{{ else }}<p:magenta>❯</>{{ end }} '
  foreground = 'p:yellow'
  background = 'transparent'
  newline = true

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '{{ .Path }}'
    foreground = 'p:blue'
    background = 'transparent'
    type = 'path'

    [blocks.segments.properties]
      cache_duration = 'none'
      style = 'full'

  [[blocks.segments]]
    template = ' on {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Staging.Changed) (.Working.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }} '
    foreground = 'p:magenta'
    background = 'transparent'
    type = 'git'

    [blocks.segments.properties]
      branch_icon = ' '
      cache_duration = 'none'
      fetch_status = true

  [[blocks.segments]]
    template = '<p:white>took</> {{ .FormattedMs }}'
    foreground = 'p:yellow'
    background = 'transparent'
    type = 'executiontime'

    [blocks.segments.properties]
      cache_duration = 'none'
      threshold = 5000

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '{{ .CurrentDate | date .Format }} '
    foreground = 'p:yellow'
    type = 'time'

    [blocks.segments.properties]
      cache_duration = 'none'
      time_format = '[15:04:05]'

  [[blocks.segments]]
    template = '❯'
    background = 'transparent'
    type = 'text'
    foreground_templates = ['{{if gt .Code 0}}p:red{{end}}', '{{if eq .Code 0}}p:magenta{{end}}']

    [blocks.segments.properties]
      cache_duration = 'none'
